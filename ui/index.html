<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Token 用量统计</title>
  <style>
    :root { --bg:#f4f3ee; --ink:#141414; --muted:rgba(20,20,20,.55); --hair:rgba(20,20,20,.16); --track:rgba(20,20,20,.1); --heat:20,20,20; --line:1.5px; --scale:1; }
    [data-theme=ink] { --bg:#141414; --ink:#efede7; --muted:rgba(239,237,231,.56); --hair:rgba(239,237,231,.18); --track:rgba(239,237,231,.1); --heat:239,237,231; }
    [data-theme=mist] { --bg:#faf9f6; --ink:#2a2a2a; --muted:rgba(42,42,42,.55); --hair:rgba(42,42,42,.15); --track:rgba(42,42,42,.09); --heat:42,42,42; --line:.75px; }
    * { box-sizing:border-box; }
    html,body { width:100%; height:100%; overflow:hidden; }
    body { margin:0; min-height:100svh; background:var(--bg); color:var(--ink); font-family:Archivo,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; -webkit-font-smoothing:antialiased; transition:background .25s,color .25s; padding:0; overflow:hidden; }
    .viewport { width:calc(1280px * var(--scale)); height:calc(576px * var(--scale)); flex:none; }
    main { width:1280px; height:576px; margin:0; padding:18px 32px 12px; transform:scale(var(--scale)); transform-origin:top left; overflow:hidden; display:flex; flex-direction:column; }
    header { display:flex; justify-content:space-between; align-items:flex-end; gap:28px; border-bottom:var(--line) solid var(--ink); padding-bottom:8px; }
    h1 { margin:0; font-size:26px; font-weight:650; letter-spacing:-.02em; line-height:.98; }
    .mono { font-family:"Space Mono",ui-monospace,SFMono-Regular,Menlo,monospace; }
    .stamp { text-align:right; font-size:11px; line-height:1.7; color:var(--muted); letter-spacing:.04em; }
    .controls { display:flex; justify-content:space-between; align-items:center; margin:9px 0 12px; gap:18px; flex-wrap:wrap; }
    .seg { display:inline-flex; border:var(--line) solid var(--ink); }
    button { border:0; border-left:var(--line) solid var(--ink); background:transparent; color:var(--ink); padding:9px 16px; cursor:pointer; font:11px/1 "Space Mono",ui-monospace,monospace; letter-spacing:.12em; text-transform:uppercase; }
    button:first-child { border-left:0; }
    button.active { background:var(--ink); color:var(--bg); }
    .tone { display:flex; align-items:center; gap:14px; }
    .tone-label { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); }
    .hero { display:grid; grid-template-columns:1.5fr 1fr 1fr; border:var(--line) solid var(--ink); margin-bottom:12px; }
    .hero-cell { padding:12px 24px; border-left:var(--line) solid var(--ink); min-height:82px; display:flex; flex-direction:column; justify-content:space-between; }
    .hero-cell:first-child { border-left:0; }
    .eyebrow { font:11px/1.4 "Space Mono",ui-monospace,monospace; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); }
    .big { font-size:34px; font-weight:650; letter-spacing:-.03em; line-height:.9; font-variant-numeric:tabular-nums; }
    .mid { font-size:25px; font-weight:650; letter-spacing:-.02em; line-height:.95; font-variant-numeric:tabular-nums; }
    .sub { margin-top:7px; font-size:11px; color:var(--muted); }
    .grid { display:grid; grid-template-columns:1.15fr 1fr; gap:32px; align-items:start; flex:none; min-height:0; }
    .section-title { display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--ink); padding-bottom:8px; margin-bottom:5px; }
    .section-title strong { font:11px/1 "Space Mono",ui-monospace,monospace; letter-spacing:.22em; text-transform:uppercase; }
    .section-title span { font-size:11px; color:var(--muted); }
    .row { padding:2px 0; border-bottom:1px solid var(--hair); }
    .row-head,.row-foot { display:flex; justify-content:space-between; align-items:baseline; gap:14px; }
    .row-head { margin-bottom:2px; }
    .row-name { display:flex; gap:12px; align-items:baseline; min-width:0; }
    .idx,.row-foot { color:var(--muted); font-size:8px; }
    .name { font-size:12px; font-weight:650; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pct { font:700 11px/1 "Space Mono",ui-monospace,monospace; }
    .bar { height:4px; background:var(--track); position:relative; overflow:hidden; }
    .bar i { display:block; height:100%; background:var(--ink); }
    .row-foot { margin-top:2px; }
    .activity { border-top:1px solid var(--ink); padding-top:8px; margin-top:8px; }
    .activity-row { display:flex; align-items:center; gap:10px; margin-bottom:5px; }
    .activity-label { width:92px; flex:none; font-size:11px; font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .activity-date { font-size:8px; color:var(--muted); }
    .activity-bar { flex:1; height:10px; background:var(--track); position:relative; }
    .activity-bar i { position:absolute; inset:0 auto 0 0; background:var(--ink); }
    .activity-share { width:40px; flex:none; text-align:right; font:700 12px/1 "Space Mono",ui-monospace,monospace; }
    .legend { display:flex; align-items:center; gap:10px; margin-top:12px; font-size:10px; color:var(--muted); }
    .legend i { width:22px; height:12px; display:inline-block; background:rgba(var(--heat),var(--a)); }
    .stats { margin-bottom:8px; display:flex; justify-content:space-between; gap:20px; }
    .stats .value { margin-top:3px; font-size:20px; font-weight:650; font-variant-numeric:tabular-nums; }
    .device-section { margin-top:8px; }
    .devices { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:8px; margin-top:8px; }
    .device { display:flex; align-items:center; gap:6px; min-width:0; padding-bottom:6px; border-bottom:1px solid var(--hair); }
    .ring { position:relative; width:34px; height:34px; flex:none; }
    .ring svg { transform:rotate(-90deg); }
    .ring b { position:absolute; inset:0; display:grid; place-items:center; font:700 9px/1 "Space Mono",ui-monospace,monospace; }
    .device-title { font-size:10px; font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .device-sub,.device-foot { font-size:7px; color:var(--muted); margin-top:1px; }
    footer { margin-top:8px; padding-top:8px; border-top:var(--line) solid var(--ink); display:flex; justify-content:space-between; gap:20px; color:var(--muted); font-size:9px; letter-spacing:.1em; }
    .error { display:none; border:1px solid #b85133; color:#b85133; padding:18px; margin:0 0 28px; }
  </style>
</head>
<body data-theme="paper">
  <div class="viewport">
  <main>
    <header><h1>Token 用量统计</h1><div class="stamp mono"><div id="periodRange">LOADING</div><div>UPDATED · <span id="updated">--</span></div></div></header>
    <div class="controls"><div class="seg" id="periods"></div><div class="tone"><span class="tone-label mono">质感</span><div class="seg" id="themes"></div></div></div>
    <div class="error mono" id="error"></div>
    <section class="hero">
      <div class="hero-cell"><div class="eyebrow">总 Token 消耗</div><div><div class="big" id="totalTokens">--</div><div class="sub mono" id="totalDelta">--</div></div></div>
      <div class="hero-cell"><div class="eyebrow">花费估算</div><div><div class="mid" id="cost">--</div><div class="sub mono">USD · ccusage 混合定价估算</div></div></div>
      <div class="hero-cell"><div class="eyebrow">节点状态</div><div><div class="mid" id="nodeState">--</div><div class="sub mono" id="nodeSub">--</div></div></div>
    </section>
    <section class="grid">
      <div><div class="section-title mono"><strong>按模型 · By Model</strong><span id="modelShare">SHARE</span></div><div id="models"></div></div>
      <div>
        <div class="section-title mono"><strong>活跃日期 · Activity</strong><span id="peakLabel">峰值 --</span></div>
        <div class="stats"><div><div class="eyebrow">日均 Token</div><div class="value" id="dailyAvg">--</div></div><div style="text-align:right"><div class="eyebrow">活跃天数</div><div class="value" id="activeDays">--</div></div></div>
        <div id="heat"></div>
        <div class="legend mono"><span>低</span><i style="--a:.06"></i><i style="--a:.28"></i><i style="--a:.55"></i><i style="--a:.82"></i><i style="--a:1"></i><span>高</span></div>
      </div>
    </section>
    <section class="device-section"><div class="section-title mono"><strong>按设备 · By Device</strong><span id="deviceCount">-- 台设备</span></div><div class="devices" id="devices"></div></section>
    <footer class="mono"><span id="footRange">--</span><span>DATA · sqlite</span></footer>
  </main>
  </div>
  <script>
    const state = { period: "month", theme: localStorage.getItem("ccusage-theme") || "paper", data: null };
    const periods = [["today","今天"],["week","本周"],["month","本月"],["year","全年"]];
    const themes = [["paper","札记"],["ink","墨"],["mist","雾"]];
    document.body.dataset.theme = state.theme;
    fitStage(); addEventListener("resize", fitStage, { passive:true }); addEventListener("orientationchange", fitStage, { passive:true });
    boot().catch(showError);
    async function boot() {
      const [daily, monthly, machines] = await Promise.all([fetchJson("/api/combined/daily"), fetchJson("/api/combined/monthly"), fetchJson("/api/combined/machines")]);
      state.data = { daily, monthly, machines, machineRows: await loadMachineRows(machines) };
      drawControls(); render();
    }
    async function fetchJson(url) { const res = await fetch(url, { cache:"no-store" }); if (!res.ok) throw new Error(`${url}: ${res.status}`); return res.json(); }
    async function loadMachineRows(payload) {
      const agents = ["claude","codex","opencode","pi"]; const out = {};
      await Promise.all((payload.machines || []).map(async (m) => {
        out[m.machine] = [];
        await Promise.all(agents.map(async (agent) => { try { const d = await fetchJson(`/api/machines/${m.machine}/latest/${agent}.daily`); out[m.machine].push(...(d.daily || []).map((row) => ({ ...row, agent }))); } catch (_) {} }));
      }));
      return out;
    }
    function drawControls() {
      periodsEl().innerHTML = periods.map(([k,l]) => `<button data-period="${k}" class="${k===state.period?"active":""}">${l}</button>`).join("");
      themesEl().innerHTML = themes.map(([k,l]) => `<button data-theme-btn="${k}" class="${k===state.theme?"active":""}">${l}</button>`).join("");
      document.querySelectorAll("[data-period]").forEach((b) => b.onclick = () => { state.period = b.dataset.period; drawControls(); render(); });
      document.querySelectorAll("[data-theme-btn]").forEach((b) => b.onclick = () => { state.theme = b.dataset.themeBtn; localStorage.setItem("ccusage-theme", state.theme); document.body.dataset.theme = state.theme; drawControls(); });
    }
    function render() {
      const rows = selectedRows(); const totals = sumRows(rows); const prev = sumRows(comparisonRows());
      const machines = state.data.machines.machines || []; const ok = machines.filter((m) => m.status === "ok").length;
      const delta = prev.totalTokens ? `${totals.totalTokens >= prev.totalTokens ? "↑" : "↓"} ${Math.abs((totals.totalTokens / prev.totalTokens - 1) * 100).toFixed(1)}% 较上一周期` : `${rows.length} 个统计点`;
      text("totalTokens", fmtTok(totals.totalTokens)); text("totalDelta", delta); text("cost", `$${fmtMoney(totals.totalCost)}`);
      text("nodeState", `${ok}/${machines.length}`); text("nodeSub", machines.filter((m) => m.status !== "ok").map((m) => `${nodeName(m.machine)}:${m.status}`).join(" · ") || "全部节点正常");
      text("periodRange", rangeLabel(rows)); text("footRange", rangeLabel(rows)); text("updated", fmtUpdated(state.data.daily.generatedAt || state.data.monthly.generatedAt));
      text("dailyAvg", fmtTok(totals.totalTokens / Math.max(activeDayCount(rows), 1))); text("activeDays", `${activeDayCount(rows)} 天`);
      renderModels(rows, totals); renderHeat(rows); renderDevices();
    }
    function selectedRows() {
      const rows = state.data.daily.daily || []; const now = rows.at(-1)?.period; if (!now) return [];
      if (state.period === "today") return rows.filter((r) => r.period === now);
      if (state.period === "week") return rows.slice(-7);
      if (state.period === "month") return rows.filter((r) => r.period.startsWith(now.slice(0,7)));
      return state.data.monthly.monthly || [];
    }
    function comparisonRows() {
      const rows = state.data.daily.daily || []; const now = rows.at(-1)?.period; if (!now) return [];
      if (state.period === "today") return rows.slice(-2, -1);
      if (state.period === "week") return rows.slice(-14, -7);
      if (state.period === "month") { const d = new Date(`${now}T00:00:00`); const prev = new Date(d.getFullYear(), d.getMonth() - 1, 1).toISOString().slice(0,7); return rows.filter((r) => r.period.startsWith(prev)); }
      return [];
    }
    function sumRows(rows) { return rows.reduce((a,r) => { ["inputTokens","outputTokens","cacheCreationTokens","cacheReadTokens","totalTokens","totalCost"].forEach((k) => a[k] += Number(r[k] || 0)); return a; }, {inputTokens:0,outputTokens:0,cacheCreationTokens:0,cacheReadTokens:0,totalTokens:0,totalCost:0}); }
    function renderModels(rows, totals) {
      const map = new Map();
      rows.forEach((r) => (r.modelBreakdowns || []).forEach((m) => { const key = m.modelName || "unknown"; const x = map.get(key) || { name:key, totalTokens:0, cost:0 }; x.totalTokens += tokenTotal(m); x.cost += Number(m.cost || 0); map.set(key, x); }));
      const models = [...map.values()].sort((a,b) => b.totalTokens - a.totalTokens).slice(0,8); const max = Math.max(...models.map((m) => m.totalTokens), 1); text("modelShare", `${models.length} MODELS`);
      document.getElementById("models").innerHTML = models.map((m,i) => { const pct = totals.totalTokens ? m.totalTokens / totals.totalTokens : 0; return `<div class="row"><div class="row-head"><div class="row-name"><span class="idx mono">${String(i+1).padStart(2,"0")}</span><span class="name">${esc(m.name)}</span></div><span class="pct">${Math.round(pct*100)}%</span></div><div class="bar"><i style="width:${(m.totalTokens/max*100).toFixed(1)}%"></i></div><div class="row-foot mono"><span>${fmtTok(m.totalTokens)} tok</span><span>$${fmtMoney(m.cost)}</span></div></div>`; }).join("") || `<div class="row mono">暂无模型数据</div>`;
    }
    function renderHeat(rows) {
      const daily = rows.filter((r) => r.period?.length === 10); const ranked = [...daily].sort((a,b) => (b.totalTokens || 0) - (a.totalTokens || 0)).slice(0,5); const max = Math.max(...ranked.map((r) => r.totalTokens || 0), 1); const peak = ranked[0];
      text("peakLabel", peak ? `峰值 ${peak.period}` : "峰值 --");
      document.getElementById("heat").innerHTML = `<div class="activity">${ranked.map((r) => { const pct = Math.max(2, (r.totalTokens || 0) / max * 100); return `<div class="activity-row"><div class="activity-label">${esc(dayLabel(r.period))}<div class="activity-date mono">${esc(r.period)}</div></div><div class="activity-bar"><i style="width:${pct.toFixed(1)}%"></i></div><div class="activity-share">${Math.round(pct)}%</div></div>`; }).join("") || `<div class="row mono">暂无活跃数据</div>`}</div>`;
    }
    function renderDevices() {
      const meta = new Map((state.data.machines.machines || []).map((m) => [m.machine, m])); const rows = Object.entries(state.data.machineRows || {}).map(([machine, rs]) => ({ machine, totals:sumRows(rs), meta:meta.get(machine) })).sort((a,b) => b.totals.totalTokens - a.totals.totalTokens); const total = rows.reduce((s,r) => s + r.totals.totalTokens, 0) || 1; const c = 2 * Math.PI * 14; text("deviceCount", `${rows.length} 台设备`);
      document.getElementById("devices").innerHTML = rows.map((r) => { const p = r.totals.totalTokens / total; return `<div class="device"><div class="ring"><svg width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="none" stroke="var(--track)" stroke-width="3"></circle><circle cx="17" cy="17" r="14" fill="none" stroke="var(--ink)" stroke-width="3" stroke-dasharray="${(p*c).toFixed(2)} ${c.toFixed(2)}"></circle></svg><b>${Math.round(p*100)}%</b></div><div><div class="device-title">${esc(nodeName(r.machine))}</div><div class="device-sub mono">${esc(deviceInfo(r.meta))}</div><div class="device-foot mono">${fmtTok(r.totals.totalTokens)} · $${fmtMoney(r.totals.totalCost)}</div></div></div>`; }).join("");
    }
    function activeDayCount(rows) { return new Set(rows.map((r) => r.period)).size; }
    function rangeLabel(rows) { if (!rows.length) return "NO DATA"; return rows[0].period === rows.at(-1).period ? rows[0].period : `${rows[0].period} — ${rows.at(-1).period}`; }
    function fmtTok(n) { n = Number(n || 0); if (n >= 1e9) return `${(n/1e9).toFixed(2)}B`; if (n >= 1e6) return `${(n/1e6).toFixed(2)}M`; if (n >= 1e3) return `${(n/1e3).toFixed(1)}K`; return Math.round(n).toLocaleString("en-US"); }
    function fmtMoney(n) { return Number(n || 0).toLocaleString("en-US", { maximumFractionDigits:Number(n || 0) < 100 ? 2 : 0 }); }
    function tokenTotal(r) { const total = Number(r.totalTokens || 0); return total > 0 ? total : ["inputTokens","outputTokens","cacheCreationTokens","cacheReadTokens"].reduce((s,k) => s + Number(r[k] || 0), 0); }
    function nodeName(id) { return ({ "52-4":"Mac mini M4", "52-30":"MacBook Air M3", "52-5-piggy":"Mac mini M2", "52-20":"Mac mini M1", "pc-2223":"PC", "pc2-2223":"PC2", "pc2-2224":"Devbox" })[id] || id; }
    function deviceInfo(m) { const p = m?.probe || {}; const os = m?.os || {}; const pretty = os.pretty || m?.osPretty || p.osPretty || platformName(m?.platform || p.platform || p.kernel); const arch = os.arch || m?.arch || p.arch; return [pretty, arch].filter(Boolean).join(" · ") || "unknown os"; }
    function platformName(v) { v = String(v || "").toLowerCase(); if (v === "darwin") return "macOS"; if (v === "linux") return "Linux"; return v; }
    function dayLabel(period) { return `周${"日一二三四五六"[new Date(`${period}T00:00:00`).getDay()]}`; }
    function fitStage() { const scale = innerWidth / 1280; document.documentElement.style.setProperty("--scale", Math.max(.1, scale).toFixed(4)); }
    function fmtUpdated(v) { if (!v) return "--"; const d = new Date(v); return `${String(d.getMonth()+1).padStart(2,"0")} / ${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }
    function text(id, value) { document.getElementById(id).textContent = value; }
    function esc(v) { return String(v).replace(/[&<>"']/g, (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c])); }
    function showError(e) { const el = document.getElementById("error"); el.style.display = "block"; el.textContent = `加载数据失败：${e.message}`; }
    function periodsEl() { return document.getElementById("periods"); }
    function themesEl() { return document.getElementById("themes"); }
  </script>
</body>
</html>
